name: Build & Deploy site

# 새 호가 push 되면 자동으로 index/RSS/sitemap을 다시 빌드하고 GitHub Pages에 배포.
# (Cloudflare Pages를 쓰는 경우엔 이 워크플로 없이도 Cloudflare가 직접 빌드함 — PUBLISHING.md 참고)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build site (index, RSS, sitemap, meta injection)
        # SITE_URL을 배포 도메인으로 맞춰주면 RSS/sitemap/OG의 절대 URL이 정확해짐.
        # 커스텀 도메인이 있으면 아래 값을 그것으로 바꾸세요.
        env:
          SITE_URL: ${{ vars.SITE_URL }}
        run: node scripts/build_site.mjs

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - id: deploy
        uses: actions/deploy-pages@v4
